<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0b0d" />
  <title>الطاقم — AI Show</title>
  <meta name="description" content="دليل أعضاء طاقم AI Show وصفحاتهم داخل المنصة." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/utilities.css" />
  <link rel="stylesheet" href="./css/themes/ai-show-dark.css" />
</head>
<body data-page="cast">
  <div class="app-shell">
    <header id="site-header"></header>

    <main id="page-content" class="page-main container section-gap-lg">
      <section class="page-intro card-surface page-intro--wide">
        <span class="eyebrow">Cast Directory</span>
        <h1 class="section-title">طاقم AI Show</h1>
        <p class="section-text">
          صفحة تجمع المؤسسين والمقدمين في مكان واحد، مع مدخل واضح لكل عضو وتحدياته وصفحته داخل المنصة.
        </p>
      </section>

      <section class="section-gap-md">
        <div class="section-head">
          <div>
            <span class="eyebrow">Founders</span>
            <h2 class="section-title section-title--md">المؤسسون والوجوه الأساسية</h2>
          </div>
        </div>
        <div id="founders-grid" class="content-grid content-grid--members"></div>
      </section>

      <section class="section-gap-md">
        <div class="section-head section-head--stack-mobile">
          <div>
            <span class="eyebrow">All Members</span>
            <h2 class="section-title section-title--md">كل أعضاء الطاقم</h2>
            <p class="section-text">الدليل الكامل للطاقم كمدخل إلى تحديات الأعضاء والتفاعل معهم.</p>
          </div>
          <div id="member-role-chips" class="filter-chips" aria-label="فلترة الأعضاء"></div>
        </div>
        <div id="members-directory-grid" class="content-grid content-grid--members"></div>
      </section>
    </main>

    <nav id="mobile-nav"></nav>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
